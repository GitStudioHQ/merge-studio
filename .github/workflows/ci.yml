name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run check-types

      - name: Test
        run: npm test

      - name: Package (smoke-test the build)
        run: npx @vscode/vsce package -o merge-studio.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: merge-studio-vsix
          path: merge-studio.vsix
